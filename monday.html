<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>周一 · 日程</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,"PingFang SC",sans-serif;background:#f0f4f8;padding:20px;color:#1a202c}.container{max-width:680px;margin:0 auto}.header{text-align:center;margin-bottom:24px}.header h1{font-size:28px;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}.header .date{color:#718096;font-size:14px}.block{background:#fff;border-radius:16px;padding:16px 20px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:12px}.block b{color:#667eea}.todo-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f0f4f8}.todo-item:last-child{border-bottom:0}.todo-item input{width:18px;height:18px;accent-color:#667eea;cursor:pointer;flex-shrink:0;margin-top:3px}.todo-item label{font-size:14px;color:#4a5568;cursor:pointer;flex:1}.todo-item input:checked+label{text-decoration:line-through;color:#a0aec0}.tag{font-size:11px;padding:2px 8px;border-radius:10px;flex-shrink:0}.b{background:#ebf4ff;color:#3182ce}.g{background:#f0fff4;color:#38a169}.p{background:#faf5ff;color:#805ad5}.o{background:#fffaf0;color:#dd6b20}.k{background:#fff5f5;color:#e53e3e}.pr{height:4px;background:#e2e8f0;border-radius:10px;margin:12px 0 4px;overflow:hidden}.pr div{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .5s;width:0%}.pt{font-size:11px;color:#a0aec0;text-align:right}.footer{text-align:center;padding:20px;font-size:12px;color:#a0aec0}@media(max-width:480px){body{padding:12px}}</style></head><body><div class=container><div class=header><h1>📋 周一 · 日程清单</h1><div class=date>2026年6月8日（周一）</div></div><div class=pr><div id=f></div></div><div class=pt>进度 <span id=pc>0</span>/<span id=tc>0</span></div><div class=block><b>🌅 7:10-12:00</b><h3>上午跟门诊</h3><div class=todo-item><input type=checkbox id=m1><label>7:10出门地铁+步行去医院 <span class="tag b">通勤</span></label></div><div class=todo-item><input type=checkbox id=m2><label>地铁上打标签2-3个 <span class="tag b">碎片</span></label></div><div class=todo-item><input type=checkbox id=m3><label>8:00-12:00跟门诊 <span class="tag k">固定</span></label></div><div class=todo-item><input type=checkbox id=m4><label>门诊间隙打标签到10-15个 <span class="tag o">打标签</span></label></div></div><div class=block><b>🌤 12:00-14:20</b><h3>午休+占星复习</h3><div class=todo-item><input type=checkbox id=n1><label>12:00-12:30午饭🍚 <span class="tag b">休息</span></label></div><div class=todo-item><input type=checkbox id=n2><label>12:30-13:00午休😴 <span class="tag b">休息</span></label></div><div class=todo-item><input type=checkbox id=n3><label>13:00-14:00占星第4节回顾+作业 <span class="tag p">占星</span></label></div><div class=todo-item><input type=checkbox id=n4><label>14:00-14:20准备下午门诊 <span class="tag b">过渡</span></label></div></div><div class=block><b>🌆 14:30-17:30</b><h3>下午跟门诊</h3><div class=todo-item><input type=checkbox id=a1><label>14:30-17:30跟门诊 <span class="tag k">固定</span></label></div><div class=todo-item><input type=checkbox id=a2><label>门诊间隙打标签补齐30个✅ <span class="tag o">打标签</span></label></div><div class=todo-item><input type=checkbox id=a3><label>17:30下班🎉 <span class="tag b">收工</span></label></div></div><div class=block><b>🌙 17:30-22:30</b><h3>晚间重点</h3><div class=todo-item><input type=checkbox id=e1><label>17:30-18:30回家+晚饭🍜 <span class="tag b">休息</span></label></div><div class=todo-item><input type=checkbox id=e2><label>18:30-20:30占星第5节完整看🎯 <span class="tag p">占星</span></label></div><div class=todo-item><input type=checkbox id=e3><label>20:30-20:40休息☕ <span class="tag b">休息</span></label></div><div class=todo-item><input type=checkbox id=e4><label>20:40-21:10USMLE病理30min <span class="tag g">USMLE</span></label></div><div class=todo-item><input type=checkbox id=e5><label>21:10-21:40上肢训练💪 <span class="tag k">运动</span></label></div><div class=todo-item><input type=checkbox id=e6><label>21:40-22:00翻一篇CMT文献 <span class="tag o">文献</span></label></div><div class=todo-item><input type=checkbox id=e7><label>22:00-22:30洗漱收尾✅ <span class="tag b">收尾</span></label></div></div><div class=block style=background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;text-align:center><div style=font-size:12px;opacity:.8;letter-spacing:2px>👉 现在就做</div><div style=font-size:18px;font-weight:700>🛌 好好休息明天早起</div><div style=font-size:13px;opacity:.9>定好7:00闹钟准备出门</div></div><div class=footer>勾选即完成✅加油卢莹💪</div></div><script>function u(){const a=document.querySelectorAll(".todo-item input"),d=document.querySelectorAll(".todo-item input:checked");document.getElementById("pc").textContent=d.length;document.getElementById("tc").textContent=a.length;const p=a.length>0?Math.round(d.length/a.length*100):0;document.querySelector(".pr div").style.width=p+"%";const s={};a.forEach(c=>{s[c.id]=c.checked});localStorage.setItem("ms",JSON.stringify(s))}const s=localStorage.getItem("ms");if(s){const st=JSON.parse(s);document.querySelectorAll(".todo-item input").forEach(c=>{if(st[c.id]!==undefined)c.checked=st[c.id]})}document.querySelectorAll(".todo-item input").forEach(c=>c.addEventListener("change",u));u()</script></body></html>
